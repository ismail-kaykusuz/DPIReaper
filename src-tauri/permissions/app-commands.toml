[[permission]]
identifier = "allow-autostart"
description = "Windows autostart registry and scheduled task commands"
commands.allow = [
  "is_autostart_registry_enabled",
  "set_autostart_enabled",
]

[[permission]]
identifier = "allow-update-check"
description = "Check GitHub Releases for application updates"
commands.allow = [
  "check_for_app_update",
]

[[permission]]
identifier = "allow-relaunch-admin"
description = "Restart the application with administrator elevation"
commands.allow = [
  "relaunch_as_admin",
]
